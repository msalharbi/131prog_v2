<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منتجات المتجر</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>متجر التقنية الحديثة</h1>
        <p>أحدث المنتجات التقنية لعام 2025</p>
    </header>

    <!-- ===== شريط التنقل ===== -->
    <nav>
        <a href="#">الرئيسية</a>
        <a href="#products">المنتجات</a>
        <a href="#order">اطلب الآن</a>
    </nav>

    <main class="products" id="products">
        <div class="product">
            <img src="images/p1.jpg" alt="منتج 1">
            <h2>سماعة بلوتوث</h2>
            <p>صوت عالي الجودة مع بطارية تدوم 12 ساعة.</p>
        </div>

        <div class="product">
            <img src="images/p2.jpg" alt="منتج 2">
            <h2>ساعة ذكية</h2>
            <p>قياس معدل ضربات القلب وتتبع النشاط اليومي.</p>
        </div>

        <div class="product">
            <img src="images/p3.jpg" alt="منتج 3">
            <h2>لوحة مفاتيح لاسلكية</h2>
            <p>تصميم مريح وسرعة استجابة عالية.</p>
        </div>
    </main>

    <!-- ===== نموذج الطلب ===== -->
    <section class="order-section" id="order">
        <h2>اطلب منتجك الآن</h2>

        <form class="order-form">

            <label>الاسم الكامل</label>
            <input type="text" placeholder="أدخل اسمك الكامل">

            <label>رقم الجوال</label>
            <input type="tel" placeholder="05xxxxxxxx">

            <label>البريد الإلكتروني</label>
            <input type="email" placeholder="example@email.com">

            <label>المنتج المطلوب</label>
            <select>
                <option value="">-- اختر منتجاً --</option>
                <option>سماعة بلوتوث</option>
                <option>ساعة ذكية</option>
                <option>لوحة مفاتيح لاسلكية</option>
            </select>

            <label>عنوان التوصيل</label>
            <input type="text" placeholder="المدينة، الحي، رقم المبنى">

            <input type="submit" value="تأكيد الطلب">

        </form>
    </section>

    <footer>
        <p>© 2025 متجر التقنية الحديثة</p>
    </footer>

</body>
</html>
